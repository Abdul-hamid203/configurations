spring:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://config.com

eureka:
  client:
    register-with-eureka: true
    fetch-registry: true
    service-url:
      defaultZone: http://localhost:8761/eureka/

management:
  endpoint:
    health:
      show-details: always
      circuitbreakers:
        enabled: true

  endpoints:
    web:
      exposure:
        include: health

  tracing:
    sampling:
      probability: 1.0
